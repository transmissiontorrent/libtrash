name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Exercise both the default static build and the shared library, so the
        # Windows DLL export path is actually verified in CI.
        shared: [OFF, ON]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DLIBTRASH_SHARED=${{ matrix.shared }}

      - name: Build
        run: cmake --build build --config Release

      # On Linux/macOS the tests are hermetic. On Windows the smoke test touches
      # the real trash, which is acceptable on an ephemeral CI runner.
      # --no-tests=error fails the job if no tests were registered (e.g. a
      # configure regression) instead of passing green with nothing run.
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure --no-tests=error
