name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      # On Linux/macOS the tests are hermetic. On Windows the smoke test touches
      # the real trash, which is acceptable on an ephemeral CI runner.
      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
